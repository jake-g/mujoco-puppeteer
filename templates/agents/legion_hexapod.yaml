agents:
- name: legion_hexapod
  type: configurable
  body:
    type: box
    size: [0.4, 0.15, 0.05]
  limbs:
    - name: front_left
      pos: [0.3, 0.2, 0]
      axis: [0, 1, 0]
      range: [-45, 45]
      geom: {type: capsule, size: [0.02, 0.1]}
    - name: mid_left
      pos: [0.0, 0.2, 0]
      axis: [0, 1, 0]
      range: [-45, 45]
      geom: {type: capsule, size: [0.02, 0.1]}
    - name: back_left
      pos: [-0.3, 0.2, 0]
      axis: [0, 1, 0]
      range: [-45, 45]
      geom: {type: capsule, size: [0.02, 0.1]}
    - name: front_right
      pos: [0.3, -0.2, 0]
      axis: [0, 1, 0]
      range: [-45, 45]
      geom: {type: capsule, size: [0.02, 0.1]}
    - name: mid_right
      pos: [0.0, -0.2, 0]
      axis: [0, 1, 0]
      range: [-45, 45]
      geom: {type: capsule, size: [0.02, 0.1]}
    - name: back_right
      pos: [-0.3, -0.2, 0]
      axis: [0, 1, 0]
      range: [-45, 45]
      geom: {type: capsule, size: [0.02, 0.1]}
