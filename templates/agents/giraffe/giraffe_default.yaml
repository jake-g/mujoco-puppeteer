agents:
- name: giraffe
  type: configurable
  body:
    type: box
    size: [0.2, 0.15, 0.1]
  limbs:
    - name: front_left
      pos: [0.15, 0.1, 0]
      axis: [0, 1, 0]
      range: [-30, 30]
      geom: {type: capsule, size: [0.02, 0.2]}
      child:
        name: front_left_calf
        axis: [0, 1, 0]
        range: [0, 90]
        geom: {type: capsule, size: [0.015, 0.2]}
    - name: front_right
      pos: [0.15, -0.1, 0]
      axis: [0, 1, 0]
      range: [-30, 30]
      geom: {type: capsule, size: [0.02, 0.2]}
      child:
        name: front_right_calf
        axis: [0, 1, 0]
        range: [0, 90]
        geom: {type: capsule, size: [0.015, 0.2]}
    - name: back_left
      pos: [-0.15, 0.1, 0]
      axis: [0, 1, 0]
      range: [-30, 30]
      geom: {type: capsule, size: [0.02, 0.2]}
      child:
        name: back_left_calf
        axis: [0, 1, 0]
        range: [0, 90]
        geom: {type: capsule, size: [0.015, 0.2]}
    - name: back_right
      pos: [-0.15, -0.1, 0]
      axis: [0, 1, 0]
      range: [-30, 30]
      geom: {type: capsule, size: [0.02, 0.2]}
      child:
        name: back_right_calf
        axis: [0, 1, 0]
        range: [0, 90]
        geom: {type: capsule, size: [0.015, 0.2]}
    - name: neck
      pos: [0.15, 0, 0.1]
      axis: [0, 1, 0]
      range: [-10, 10]
      geom: {type: capsule, size: [0.02, 0.3]}
