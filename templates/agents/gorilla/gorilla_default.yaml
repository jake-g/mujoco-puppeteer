agents:
- name: gorilla
  type: configurable
  body:
    type: box
    size: [0.3, 0.25, 0.3]
    mass: 30.0
  limbs:
    - name: arm_left
      pos: [0.2, 0.25, 0.1]
      axis: [0, 1, 0]
      range: [-45, 45]
      geom: {type: capsule, size: [0.04, 0.3]}
      child:
        name: forearm_left
        axis: [0, 1, 0]
        range: [0, 90]
        geom: {type: capsule, size: [0.03, 0.25]}
    - name: arm_right
      pos: [0.2, -0.25, 0.1]
      axis: [0, 1, 0]
      range: [-45, 45]
      geom: {type: capsule, size: [0.04, 0.3]}
      child:
        name: forearm_right
        axis: [0, 1, 0]
        range: [0, 90]
        geom: {type: capsule, size: [0.03, 0.25]}
    - name: leg_left
      pos: [-0.2, 0.2, -0.15]
      axis: [0, 1, 0]
      range: [-30, 30]
      geom: {type: capsule, size: [0.03, 0.15]}
    - name: leg_right
      pos: [-0.2, -0.2, -0.15]
      axis: [0, 1, 0]
      range: [-30, 30]
      geom: {type: capsule, size: [0.03, 0.15]}
